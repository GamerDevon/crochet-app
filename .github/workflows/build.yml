name: Build App Targets
on: [push, workflow_dispatch]

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # 1. Generates core project Windows files safely
      - run: flutter create . --platforms=windows

      # 2. Re-injects missing localized packages manually into pubspec
      - run: flutter pub add flutter_localizations --sdk=flutter
      - run: flutter pub add supabase_flutter:^2.8.0
      
      - run: flutter pub get
      
      # 3. Build the Windows Release target
      - run: flutter build windows --release
      
      # 4. Upload the built executable zip artifact
      - name: Upload Windows Bundle
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/windows/x64/runner/Release/
